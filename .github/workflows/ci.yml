name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Run the production deploy job after verification on main.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: Worker runtime tests
        run: npm run test:workers

      - name: Build
        run: npm run build

  deploy-production:
    name: Deploy production Worker
    needs: verify
    runs-on: ubuntu-latest
    # CLOUDFLARE_DEPLOY_ENABLED is a repository-level deploy gate. Production
    # credentials remain in the GitHub production environment.
    if: >-
      vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production))
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply remote D1 migrations
        run: npm run cf:migrate:production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        id: deploy
        run: |
          set -euo pipefail
          npm exec -- wrangler deploy --config apps/api/wrangler.production.jsonc | tee wrangler-deploy.log
          url="$(grep -Eo 'https://[^ ]+\\.workers\\.dev' wrangler-deploy.log | tail -n 1 || true)"
          echo "deployment-url=${url}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
