name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Run the production deploy job after verification on main.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: Worker runtime tests
        run: npm run test:workers

      - name: Build
        run: npm run build

  cloudflare_production_preflight:
    name: Cloudflare production preflight
    needs: verify
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      should_deploy: ${{ steps.preflight.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Report Cloudflare deploy readiness
        id: preflight
        run: npm run cf:preflight:ci -- --summary --set-output
        env:
          CLOUDFLARE_DEPLOY_ENABLED: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED }}
          DEPLOY_PRODUCTION_INPUT: ${{ inputs.deploy_production }}
          CLOUDFLARE_ACCOUNT_ID_PRESENT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
          CLOUDFLARE_API_TOKEN_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}

  deploy-production:
    name: Deploy production Cloudflare
    needs:
      - verify
      - cloudflare_production_preflight
    runs-on: ubuntu-latest
    # Deployment stays fail-closed: the visible preflight job decides whether the
    # explicit repository gate and main-branch trigger allow production mutation.
    if: >-
      always() &&
      needs.verify.result == 'success' &&
      needs.cloudflare_production_preflight.outputs.should_deploy == 'true'
    environment:
      name: production
      url: ${{ steps.deploy-pages.outputs.deployment-url }}
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production Cloudflare credentials
        run: npm run cf:preflight:ci -- --summary --require-secrets
        env:
          CLOUDFLARE_DEPLOY_ENABLED: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED }}
          DEPLOY_PRODUCTION_INPUT: ${{ inputs.deploy_production }}
          CLOUDFLARE_ACCOUNT_ID_PRESENT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
          CLOUDFLARE_API_TOKEN_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}

      - name: Apply remote D1 migrations
        run: npm run cf:migrate:production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        id: deploy-worker
        run: |
          set -euo pipefail
          npm exec -- wrangler deploy --config apps/api/wrangler.production.jsonc | tee wrangler-deploy.log
          url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev' wrangler-deploy.log | tail -n 1 || true)"
          if [ -z "$url" ]; then
            echo "::error::Could not parse Worker .workers.dev URL from Wrangler deploy output."
            exit 1
          fi
          echo "deployment-url=${url}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build web for production Worker
        run: npm run build:web
        env:
          VITE_API_BASE_URL: ${{ steps.deploy-worker.outputs.deployment-url }}

      - name: Deploy Pages
        id: deploy-pages
        run: |
          set -euo pipefail
          npm exec -- wrangler pages deploy dist/web --project-name annotated-canvas --branch main | tee wrangler-pages.log
          url="$(grep -Eo 'https://[^[:space:]]+\.pages\.dev' wrangler-pages.log | tail -n 1 || true)"
          echo "deployment-url=${url:-https://annotated-canvas.pages.dev}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deployment summary
        run: |
          {
            echo "## Cloudflare deployment"
            echo "- Worker: ${{ steps.deploy-worker.outputs.deployment-url }}"
            echo "- Pages: ${{ steps.deploy-pages.outputs.deployment-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
